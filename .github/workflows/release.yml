name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runtime: win-x64
            os: windows-latest
          - runtime: osx-arm64
            os: macos-latest
          - runtime: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish Pinscreen2.App/Pinscreen2.App.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -o publish/${{ matrix.runtime }}

      - name: Zip (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd publish/${{ matrix.runtime }}
          zip -r ../../Pinscreen2-${{ matrix.runtime }}.zip .

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.runtime }}/* -DestinationPath Pinscreen2-${{ matrix.runtime }}.zip

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} Pinscreen2-${{ matrix.runtime }}.zip --clobber

  server:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish server
        run: >
          dotnet publish Pinscreen2.Server/Pinscreen2.Server.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/server

      - name: Zip server
        shell: pwsh
        run: Compress-Archive -Path publish/server/* -DestinationPath Pinscreen2-Server-win-x64.zip

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} Pinscreen2-Server-win-x64.zip --clobber
